name: NuviCore Auto-Bot
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - setup-python:
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Deps
        run: pip install pandas requests
      - name: Scrape
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main_scraper.py
      - name: Save
        run: |
          git config --local user.name "Bot"
          git add campionati/*.csv
          git commit -m "Update" || exit 0
          git push
