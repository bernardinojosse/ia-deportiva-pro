name: Escaneo Automatico NuviCore

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Instalar Librerias
        run: pip install pandas requests beautifulsoup4 lxml
        
      - name: Ejecutar Scraper
        run: python main_scraper.py
        
      - name: Subir Cambios a GitHub
        run: |
          git config --global user.name "NuviCore-Bot"
          git config --global user.email "bot@nuvicore.com"
          git add campionati/*.csv
          git commit -m "Actualización automática de cuotas" || echo "Sin cambios detectados"
          git push || echo "No hay cambios para subir"
