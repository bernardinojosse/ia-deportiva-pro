name: Actualización Automática Nuvi-Core

on:
  schedule:
    # Se ejecuta cada 3 horas (00:00, 03:00, 06:00, etc.)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente si quieres

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install pandas requests beautifulsoup4 lxml

      - name: Ejecutar Scrapers
        run: |
          # Aquí llamamos a tu script principal que recorre los campeonatos
          python main_scraper.py 

      - name: Guardar cambios en CSV
        run: |
          git config --global user.name "NuviCore-Bot"
          git config --global user.email "bot@nuvicore.com"
          git add campionati/*.csv
          git commit -m "Auto-update: Datos de mercado actualizados" || echo "Sin cambios"
          git push
